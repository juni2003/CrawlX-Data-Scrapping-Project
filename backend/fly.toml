# Fly.io deployment configuration for CrawlX backend

app = "crawlx-data-scrapping-project"
primary_region = "ams"

[build]
builder = "paketobuildpacks"
buildpacks = ["gcr.io/paketo-buildpacks/python"]

[env]
PYTHONUNBUFFERED = "true"
HOST = "0.0.0.0"
PORT = "8000"
UVICORN_RELOAD = "false"

[http_service]
internal_port = 8000
force_https = false
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[[services]]
protocol = "tcp"
internal_port = 8000

  [services.concurrency]
  type = "connections"
  hard_limit = 25
  soft_limit = 20

  [[services.tcp_checks]]
  grace_period = "10s"
  interval = "15s"
  timeout = "5s"
  address = "0.0.0.0:8000"

[deploy]
strategy = "rolling"
